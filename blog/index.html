2bb9c70><span class="icon vpi-folder" data-v-f2bb9c70></span><!--[--><!--[--><a class="vp-link no-icon link" href="/blog/categories/?id=e155e1" data-v-f2bb9c70 data-v-e457413e><!--[-->life<!--]--><!----></a><!----><!--]--><!--]--></div><div class="tag-list" data-v-f2bb9c70><span class="icon vpi-tag" data-v-f2bb9c70></span><!--[--><a class="vp-link no-icon link tag vp-tag-bf4u" href="/blog/tags/?tag=life" data-v-f2bb9c70 data-v-e457413e><!--[-->life<!--]--><!----></a><!--]--></div><div class="create-time" data-v-f2bb9c70><span class="icon vpi-clock" data-v-f2bb9c70></span><span data-v-f2bb9c70>2025-01-25</span></div></div><div class="vp-doc excerpt" data-v-f2bb9c70><p>This is why I love stories, even the ones that make no sense at first glance.
They force us to look at the messiness of life, the contradictions, and the
pain—and somehow find meaning in them.</p>
</div></div></div></template><template><div class="vp-blog-post-item" data-allow-mismatch data-v-107f28fe data-v-f2bb9c70><!----><div class="blog-post-item-content" data-v-f2bb9c70><h3 data-v-f2bb9c70><!----><!----><a class="vp-link no-icon link" href="/life/spain-travelogue-2/" data-v-f2bb9c70 data-v-e457413e><!--[-->西班牙游记(2) 巴伦西亚——欧洲的敦煌<!--]--><!----></a></h3><div class="post-meta" data-v-f2bb9c70><div class="category-list" data-v-f2bb9c70><span class="icon vpi-folder" data-v-f2bb9c70></span><!--[--><!--[--><a class="vp-link no-icon link" href="/blog/categories/?id=e155e1" data-v-f2bb9c70 data-v-e457413e><!--[-->life<!--]--><!----></a><!----><!--]--><!--]--></div><div class="tag-list" data-v-f2bb9c70><span class="icon vpi-tag" data-v-f2bb9c70></span><!--[--><a class="vp-link no-icon link tag vp-tag-bf4u" href="/blog/tags/?tag=life" data-v-f2bb9c70 data-v-e457413e><!--[-->life<!--]--><!----></a><!--]--></div><div class="create-time" data-v-f2bb9c70><span class="icon vpi-clock" data-v-f2bb9c70></span><span data-v-f2bb9c70>2025-01-02</span></div></div><div class="vp-doc excerpt" data-v-f2bb9c70><p>作为古时地中海海防的关键港口，巴伦西亚是历代的兵家必争之地。如果说伊比利亚半岛是一幅热情悦动的水彩画，那么巴伦西亚则是画中浓墨重彩的那抹余晖。</p>
</div></div></div></template><template><div class="vp-blog-post-item" data-allow-mismatch data-v-107f28fe data-v-f2bb9c70><!----><div class="blog-post-item-content" data-v-f2bb9c70><h3 data-v-f2bb9c70><!----><!----><a class="vp-link no-icon link" href="/life/spain-travelogue-1/" data-v-f2bb9c70 data-v-e457413e><!--[-->西班牙游记(1) 巴塞罗那·高迪·自然现代主义<!--]--><!----></a></h3><div class="post-meta" data-v-f2bb9c70><div class="category-list" data-v-f2bb9c70><span class="icon vpi-folder" data-v-f2bb9c70></span><!--[--><!--[--><a class="vp-link no-icon link" href="/blog/categories/?id=e155e1" data-v-f2bb9c70 data-v-e457413e><!--[-->life<!--]--><!----></a><!----><!--]--><!--]--></div><div class="tag-list" data-v-f2bb9c70><span class="icon vpi-tag" data-v-f2bb9c70></span><!--[--><a class="vp-link no-icon link tag vp-tag-bf4u" href="/blog/tags/?tag=life" data-v-f2bb9c70 data-v-e457413e><!--[-->life<!--]--><!----></a><!--]--></div><div class="create-time" data-v-f2bb9c70><span class="icon vpi-clock" data-v-f2bb9c70></span><span data-v-f2bb9c70>2025-01-01</span></div></div><div class="vp-doc excerpt" data-v-f2bb9c70><p>通宵一晚写目标检测算法后，第二天乘机来到了巴塞罗那。它给我的第一印象与巴黎别无二致——欧式街区，没有摩天大厦，多是砖石铺陈的几层建筑，房屋外饰嵌以人像等雕刻。我们一行四人在青旅下榻后，简单收拾行李，便前往了圣家教堂。</p>
